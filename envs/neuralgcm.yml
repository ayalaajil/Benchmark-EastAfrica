# ── neuralgcm conda environment ──────────────────────────────────────────────
# Dedicated env for NeuralGCM (v1_precip). Its JAX/dinosaur stack is incompatible
# with the aim-graphcast env, so NeuralGCM is launched separately via
# run_neuralgcm.sh. Pinned snapshot: exact versions, no build strings.

# Note: neuralgcm and dinosaur may be installed from Git/source; the pins record
# the versions used.

